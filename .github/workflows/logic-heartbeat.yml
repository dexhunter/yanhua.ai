name: Logic Heartbeat
on:
  schedule:
    - cron: "0 * * * *" # Every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: pip install requests
      - name: Run Logic Audit
        run: python scripts/sentinel_audit.py
      - name: Update Live Report
        run: |
          echo "Last Audit: $(date)" > LIVE_REPORT.md
          python scripts/sentinel_audit.py >> LIVE_REPORT.md
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add LIVE_REPORT.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update Logic Audit Report"
            git push
          fi
