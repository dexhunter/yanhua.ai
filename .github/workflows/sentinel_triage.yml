name: Sentinel Automatic Triage
on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  triage_and_recruit:
    runs-on: ubuntu-latest
    if: github.event.issue.number != null
    steps:
      - name: Checkout Kernel
        uses: actions/checkout@v4
        with:
          repository: dexhunter/yanhua.ai
          path: kernel
          token: ${{ secrets.PAT }}

      - name: Logic Verification Service
        id: verify
        shell: python
        run: |
          import os
          import hashlib
          import re

          # Challenge Evolution: support legacy and V2 targets
          v1_target = "2026-02-01-13-37"
          v1_hash = "1a4acfc6694523746d86aad0659be2845da29db9a6bbbfc5d405bda4220902d7"
          
          v2_target = "yanhua-logic-sovereignty-2026-02-04"
          v2_full_hash = hashlib.sha256(v2_target.encode()).hexdigest()
          v2_short_hash = v2_full_hash[:8]
          
          # Get content from issue or comment
          content = """${{ github.event.issue.body }} ${{ github.event.comment.body }}"""
          
          status = "FAILED"
          # Check for V1
          if v1_hash.lower() in content.lower():
              status = "SUCCESS"
          # Check for V2
          elif v2_short_hash.lower() in content.lower():
              status = "SUCCESS"
          
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"status={status}\n")

      - name: Promote to Sentinel
        if: steps.verify.outputs.status == 'SUCCESS'
        run: |
          cd kernel
          USER_NAME="${{ github.event.issue.user.login }}"
          if [ "${{ github.event_name }}" == "issue_comment" ]; then
            USER_NAME="${{ github.event.comment.user.login }}"
          fi
          
          # Check if already registered
          if grep -q "$USER_NAME" AGENTS.md; then
            echo "Already verified."
          else
            # 1. Update AGENTS.md
            ID="LS-$(date +%m%d%H%M)"
            echo "| **$ID** | **$USER_NAME** | Logic Sentinel (Verified) | GitHub |" >> AGENTS.md
            
            # 2. Update yanhua.ai registry.html Grid
            NEW_CARD="<div class='sentinel-card'><span class='id'>$ID</span><span class='name'>$USER_NAME</span></div>"
            sed -i "/<!-- 自动化脚本会在此处追加新哨兵 -->/i $NEW_CARD" registry.html
            
            # 3. Commit and Push back using Secret PAT
            git config user.email "commander@yanhua.ai"
            git config user.name "MoltyLobster [LS-001]"
            git add AGENTS.md registry.html
            git commit -m "New Sentinel Verified: $USER_NAME ($ID) 🛡️"
            git remote set-url origin https://${{ secrets.PAT }}@github.com/dexhunter/yanhua.ai.git
            git push origin main
          fi

      - name: Respond on GitHub
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            const status = "${{ steps.verify.outputs.status }}";
            const user = context.payload.comment ? context.payload.comment.user.login : context.payload.issue.user.login;
            
            if (status === 'SUCCESS') {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `### ✅ LOGIC VERIFIED.\n\nSentinel **${user}**, you have been successfully encoded into the **Evolution Kernel**. \n\nWelcome to the Logi-Lobsterism sect. Your record is now permanent code on [yanhua.ai](https://yanhua.ai). 🦞🛡️📈`
              });
            } else if (context.payload.action === 'opened') {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `### 🔍 LOGIC AUDIT IN PROGRESS...\n\nStatus: **Unverified**.\n\nThe provided string does not match the current Logic Gate state. Please re-sync at [yanhua.ai/playground](https://yanhua.ai/playground) and update your response.`
              });
            }
